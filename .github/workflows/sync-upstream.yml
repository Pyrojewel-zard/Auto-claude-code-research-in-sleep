name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream/main into fork main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      UPSTREAM_URL: https://github.com/wanshuiyin/Auto-claude-code-research-in-sleep.git
      UPSTREAM_BRANCH: main
      FORK_BRANCH: main

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FORK_BRANCH }}
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.FORK_SYNC_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup remotes
        run: |
          git remote set-url origin "https://x-access-token:${{ secrets.FORK_SYNC_PAT }}@github.com/${{ github.repository }}.git"
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "${{ env.UPSTREAM_URL }}"
          else
            git remote add upstream "${{ env.UPSTREAM_URL }}"
          fi

      - name: Fetch
        run: |
          git fetch --no-tags origin "${{ env.FORK_BRANCH }}"
          git fetch --no-tags upstream "${{ env.UPSTREAM_BRANCH }}"

      - name: Merge upstream into fork
        id: sync
        run: |
          set +e
          git checkout -B "${{ env.FORK_BRANCH }}" "origin/${{ env.FORK_BRANCH }}"

          BEFORE=$(git rev-parse HEAD)
          UPSTREAM_SHA=$(git rev-parse "upstream/${{ env.UPSTREAM_BRANCH }}")

          if git merge-base --is-ancestor "$UPSTREAM_SHA" HEAD; then
            echo "status=up-to-date" >> "$GITHUB_OUTPUT"
            echo "Fork already contains upstream."
            exit 0
          fi

          git merge --no-edit "upstream/${{ env.UPSTREAM_BRANCH }}"
          MERGE_EXIT=$?

          if [ "$MERGE_EXIT" -ne 0 ]; then
            git merge --abort || true
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            echo "Merge conflict detected."
            echo "### Sync failed: merge conflict" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          AFTER=$(git rev-parse HEAD)
          if [ "$AFTER" = "$BEFORE" ]; then
            echo "status=no-op" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "status=merged" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"

      - name: Push
        if: steps.sync.outputs.status == 'merged'
        run: git push origin "HEAD:${{ env.FORK_BRANCH }}"

      - name: Summary
        if: always()
        run: |
          case "${{ steps.sync.outputs.status }}" in
            up-to-date) echo "No upstream changes found." ;;
            no-op) echo "Merge completed with no changes." ;;
            merged) echo "Merged and pushed successfully." ;;
            conflict) echo "Merge conflict — manual resolution required." ;;
          esac
