name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 daily (Beijing time 10:00)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Only check for updates, do not create PR'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_UPSTREAM_SYNC || github.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/wanshuiyin/Auto-claude-code-research-in-sleep.git
          git fetch upstream

      - name: Check for upstream changes
        id: check
        shell: bash
        run: |
          set -euo pipefail

          MERGE_BASE=$(git merge-base main upstream/main)
          UPSTREAM_HEAD=$(git rev-parse upstream/main)

          echo "merge_base=$MERGE_BASE" >> "$GITHUB_OUTPUT"
          echo "upstream_head=$UPSTREAM_HEAD" >> "$GITHUB_OUTPUT"

          if [ "$MERGE_BASE" = "$UPSTREAM_HEAD" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "new_commits=0" >> "$GITHUB_OUTPUT"
            echo "Upstream is already up to date."
          else
            NEW_COMMITS=$(git rev-list --count "${MERGE_BASE}..upstream/main")
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "new_commits=$NEW_COMMITS" >> "$GITHUB_OUTPUT"
            echo "Found ${NEW_COMMITS} new commit(s) from upstream."
          fi

      - name: Show upstream commits in dry run
        if: steps.check.outputs.has_updates == 'true' && fromJSON(github.event.inputs.dry_run || 'false') == true
        shell: bash
        run: |
          set -euo pipefail
          echo "Dry run only. Upstream commits:"
          git log --oneline --no-merges \
            "${{ steps.check.outputs.merge_base }}..upstream/main"

      - name: Check existing open sync PR
        if: steps.check.outputs.has_updates == 'true' && fromJSON(github.event.inputs.dry_run || 'false') != true
        id: existing_pr
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          COUNT=$(gh pr list \
            --state open \
            --base main \
            --search "in:title Sync: upstream" \
            --json number \
            --jq 'length')

          if [ "$COUNT" -gt 0 ]; then
            echo "has_open_sync_pr=true" >> "$GITHUB_OUTPUT"
            echo "There is already an open sync PR. Skipping new PR creation."
          else
            echo "has_open_sync_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch
        if: steps.check.outputs.has_updates == 'true' && fromJSON(github.event.inputs.dry_run || 'false') != true && steps.existing_pr.outputs.has_open_sync_pr == 'false'
        id: branch
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="sync-upstream-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH" upstream/main

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Push sync branch
        if: steps.check.outputs.has_updates == 'true' && fromJSON(github.event.inputs.dry_run || 'false') != true && steps.existing_pr.outputs.has_open_sync_pr == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git push origin "${{ steps.branch.outputs.branch }}"

      - name: Create pull request
        if: steps.check.outputs.has_updates == 'true' && fromJSON(github.event.inputs.dry_run || 'false') != true && steps.existing_pr.outputs.has_open_sync_pr == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          NEW_COMMITS="${{ steps.check.outputs.new_commits }}"
          BRANCH="${{ steps.branch.outputs.branch }}"

          COMMITS=$(git log --oneline --no-merges \
            "${{ steps.check.outputs.merge_base }}..upstream/main")

          BODY_FILE=$(mktemp)
          echo "Auto-synced from upstream \`wanshuiyin/Auto-claude-code-research-in-sleep\`." > "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "${{ steps.check.outputs.new_commits }} new commit(s) since last sync." >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo '<details>' >> "$BODY_FILE"
          echo '<summary>Upstream commits</summary>' >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo '```' >> "$BODY_FILE"
          echo "$COMMITS" >> "$BODY_FILE"
          echo '```' >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo '</details>' >> "$BODY_FILE"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Sync: upstream ${{ steps.check.outputs.new_commits }} new commit(s)" \
            --body "$(cat "$BODY_FILE")"
          rm -f "$BODY_FILE"

      - name: Summary
        shell: bash
        run: |
          if [ "${{ steps.check.outputs.has_updates }}" = "false" ]; then
            echo "No action needed — fork is up to date with upstream."
          elif [ "${{ fromJSON(github.event.inputs.dry_run || 'false') }}" = "true" ]; then
            echo "Dry run completed — updates exist but no PR was created."
          elif [ "${{ steps.existing_pr.outputs.has_open_sync_pr }}" = "true" ]; then
            echo "Updates exist, but an open sync PR already exists."
          else
            echo "Sync PR created successfully."
          fi